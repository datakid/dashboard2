<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<link rel="icon" type="image/x-icon" href="favicon.ico">
<title>Lx Dashboard</title>
<script>
  const savedTheme = localStorage.getItem('lx-theme-pref') || 'auto';
  const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
  if (savedTheme === 'dark' || (savedTheme === 'auto' && prefersDark)) {
    document.documentElement.classList.add('dark');
  }
</script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/3.7.0/chart.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/fuse.js/6.6.2/fuse.min.js"></script>
<style>
:root {
  --sys-blue: #007AFF;
  --sys-blue-light: rgba(0, 122, 255, 0.12);
  --sys-blue-dark: #005bb5;
  --sys-green: #34C759;
  --sys-green-light: rgba(52, 199, 89, 0.12);
  --sys-indigo: #5856D6;
  --sys-orange: #FF9500;
  --sys-red: #FF3B30;
  --sys-red-light: rgba(255, 59, 48, 0.12);
  --sys-pink: #FF2D55;
  --sys-purple: #AF52DE;
  --sys-teal: #5AC8FA;
  --sys-yellow: #FFCC00;
  --bg-color: #F5F5F7;
  --card-bg: #FFFFFF;
  --card-bg-translucent: rgba(255, 255, 255, 0.85);
  --popover-bg: rgba(255, 255, 255, 0.85);
  --text-primary: #1D1D1F;
  --text-secondary: #86868B;
  --text-tertiary: #A1A1A6;
  --border-light: rgba(0, 0, 0, 0.08);
  --border-medium: rgba(0, 0, 0, 0.15);
  --border-focus: rgba(0, 122, 255, 0.4);
  --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.04);
  --shadow-md: 0 4px 16px rgba(0, 0, 0, 0.06), 0 1px 4px rgba(0, 0, 0, 0.04);
  --shadow-lg: 0 10px 30px rgba(0, 0, 0, 0.08), 0 4px 12px rgba(0, 0, 0, 0.04);
  --shadow-float: 0 20px 40px rgba(0, 0, 0, 0.12), 0 8px 16px rgba(0, 0, 0, 0.06);
  --radius-sm: 8px;
  --radius-md: 12px;
  --radius-lg: 16px;
  --radius-xl: 18px;
  --spring: cubic-bezier(0.2, 0.8, 0.2, 1);
  --ease-out: cubic-bezier(0.16, 1, 0.3, 1);
}

html.dark {
  --sys-blue: #0A84FF;
  --sys-blue-light: rgba(10, 132, 255, 0.2);
  --sys-blue-dark: #409CFF;
  --sys-green: #32D74B;
  --sys-green-light: rgba(50, 215, 75, 0.2);
  --sys-indigo: #5E5CE6;
  --sys-orange: #FF9F0A;
  --sys-red: #FF453A;
  --sys-red-light: rgba(255, 69, 58, 0.2);
  --sys-pink: #FF375F;
  --sys-purple: #BF5AF2;
  --sys-teal: #64D2FF;
  --sys-yellow: #FFD60A;
  --bg-color: #000000;
  --card-bg: #1C1C1E;
  --card-bg-translucent: rgba(28, 28, 30, 0.85);
  --popover-bg: rgba(44, 44, 46, 0.85);
  --text-primary: #F5F5F7;
  --text-secondary: #98989D;
  --text-tertiary: #636366;
  --border-light: rgba(255, 255, 255, 0.1);
  --border-medium: rgba(255, 255, 255, 0.2);
  --border-focus: rgba(10, 132, 255, 0.5);
  --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.4);
  --shadow-md: 0 4px 16px rgba(0, 0, 0, 0.4), 0 1px 4px rgba(0, 0, 0, 0.3);
  --shadow-lg: 0 10px 30px rgba(0, 0, 0, 0.5), 0 4px 12px rgba(0, 0, 0, 0.4);
  --shadow-float: 0 20px 40px rgba(0, 0, 0, 0.6), 0 8px 16px rgba(0, 0, 0, 0.5);
}

*, *::before, *::after { box-sizing: border-box; }

body {
  font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "Helvetica Neue", Helvetica, Arial, sans-serif;
  margin: 0;
  padding: 2.5rem 4vw;
  background-color: var(--bg-color);
  color: var(--text-primary);
  line-height: 1.5;
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  transition: background-color 0.3s ease, color 0.3s ease;
}

@keyframes slideUpFade {
  from { opacity: 0; transform: translateY(12px); }
  to { opacity: 1; transform: translateY(0); }
}

@keyframes scaleIn {
  from { opacity: 0; transform: scale(0.96); }
  to { opacity: 1; transform: scale(1); }
}

::-webkit-scrollbar { width: 12px; height: 12px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--text-tertiary); border-radius: 12px; border: 3px solid var(--bg-color); }
::-webkit-scrollbar-thumb:hover { background: var(--text-secondary); }

.dashboard-header {
  display: flex;
  justify-content: space-between;
  align-items: flex-end;
  margin-bottom: 2.5rem;
  animation: slideUpFade 0.6s var(--spring);
  flex-wrap: wrap;
  gap: 1rem;
}

.brand { display: flex; align-items: center; gap: 0.6rem; }

.brand-lx {
  background: linear-gradient(135deg, var(--sys-blue) 0%, var(--sys-purple) 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  font-size: 2.5rem;
  font-weight: 800;
  letter-spacing: -0.04em;
  line-height: 1;
}

.dashboard-header h1 {
  font-size: 2.2rem;
  font-weight: 600;
  letter-spacing: -0.03em;
  margin: 0;
  color: var(--text-primary);
  line-height: 1;
}

.header-right { display: flex; align-items: flex-end; gap: 1.5rem; }

.theme-switcher {
  display: flex;
  background: var(--border-light);
  padding: 3px;
  border-radius: 99px;
  align-items: center;
  height: 2.4rem;
}

.theme-btn {
  background: transparent;
  border: none;
  padding: 0 0.8rem;
  height: 100%;
  border-radius: 99px;
  color: var(--text-secondary);
  cursor: pointer;
  transition: all 0.2s ease;
  display: flex;
  align-items: center;
  justify-content: center;
}

.theme-btn:hover { color: var(--text-primary); }
.theme-btn.active { background: var(--card-bg); color: var(--text-primary); box-shadow: 0 2px 5px rgba(0,0,0,0.1); }

.year-filter-container { display: flex; flex-direction: column; align-items: flex-end; gap: 0.3rem; }

.year-filter-label {
  font-size: 0.75rem;
  font-weight: 600;
  color: var(--text-secondary);
  text-transform: uppercase;
  letter-spacing: 0.06em;
}

#yearFilter {
  appearance: none;
  background-color: var(--card-bg-translucent);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border: 1px solid var(--border-light);
  border-radius: var(--radius-md);
  padding: 0.45rem 2rem 0.45rem 1rem;
  font-size: 0.95rem;
  font-weight: 600;
  color: var(--text-primary);
  cursor: pointer;
  box-shadow: var(--shadow-sm);
  transition: all 0.2s var(--ease-out);
  background-image: url("data:image/svg+xml,%3Csvg width='10' height='6' viewBox='0 0 10 6' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1L5 5L9 1' stroke='%2386868B' stroke-width='1.5' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E");
  background-repeat: no-repeat;
  background-position: right 1rem center;
  height: 2.4rem;
}

#yearFilter:hover { box-shadow: var(--shadow-md); border-color: var(--border-medium); }
#yearFilter:focus { outline: none; border-color: var(--sys-blue); box-shadow: 0 0 0 3px var(--border-focus); }

.search-bar-container {
  margin-bottom: 2.5rem;
  position: relative;
  z-index: 100;
  animation: slideUpFade 0.6s var(--spring) 0.1s both;
}

.premium-search-wrapper {
  background: var(--card-bg-translucent);
  backdrop-filter: blur(24px) saturate(180%);
  -webkit-backdrop-filter: blur(24px) saturate(180%);
  border: 1px solid var(--border-light);
  border-radius: var(--radius-lg);
  box-shadow: var(--shadow-md);
  display: flex;
  align-items: center;
  padding: 0.7rem 1.2rem;
  gap: 0.75rem;
  transition: all 0.3s var(--spring);
  min-height: 4.2rem;
}

.premium-search-wrapper:focus-within {
  box-shadow: var(--shadow-lg), 0 0 0 3px var(--border-focus);
  border-color: var(--sys-blue);
  background: var(--card-bg);
}

.search-icon-premium {
  color: var(--text-secondary);
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 0.5rem 0;
  cursor: pointer;
  transition: color 0.2s;
}

.search-icon-premium:hover,
.premium-search-wrapper:focus-within .search-icon-premium { color: var(--sys-blue); }

.search-chips-container { display: flex; flex-wrap: wrap; gap: 0.5rem; align-items: center; }

.search-chip {
  display: inline-flex;
  align-items: center;
  padding: 0.35rem 0.7rem;
  border-radius: var(--radius-sm);
  font-size: 0.85rem;
  font-weight: 500;
  background-color: var(--bg-color);
  color: var(--text-primary);
  border: 1px solid var(--border-light);
  box-shadow: var(--shadow-sm);
  animation: scaleIn 0.2s var(--spring);
}

.search-chip-category { font-size: 0.7rem; font-weight: 600; margin-right: 0.4rem; opacity: 0.8; }

.search-chip-remove {
  margin-left: 0.5rem;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--text-tertiary);
  transition: color 0.2s;
}

.search-chip-remove:hover { color: var(--sys-red); }

#universalSearchInput {
  border: none;
  outline: none;
  background: transparent;
  font-family: inherit;
  font-size: 1.05rem;
  font-weight: 400;
  color: var(--text-primary);
  flex-grow: 1;
  min-width: 150px;
}

#universalSearchInput::placeholder { color: var(--text-tertiary); }

.search-actions { display: flex; align-items: center; gap: 0.4rem; }

.search-action-btn {
  background: none;
  border: none;
  color: var(--text-secondary);
  cursor: pointer;
  width: 32px;
  height: 32px;
  border-radius: var(--radius-sm);
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.2s;
}

.search-action-btn:hover { background-color: var(--bg-color); color: var(--text-primary); }
.search-action-btn.danger:hover { background-color: var(--sys-red-light); color: var(--sys-red); }
.search-action-btn.primary { color: var(--sys-blue); }
.search-action-btn.primary:hover { background-color: var(--sys-blue-light); }

.search-shortcut {
  background: var(--bg-color);
  border: 1px solid var(--border-light);
  border-radius: 6px;
  padding: 0.2rem 0.5rem;
  font-size: 0.75rem;
  font-weight: 600;
  color: var(--text-secondary);
  font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
}

.universal-search-results {
  position: absolute;
  top: calc(100% + 12px);
  left: 0;
  width: 100%;
  background: var(--popover-bg);
  backdrop-filter: blur(40px) saturate(200%);
  -webkit-backdrop-filter: blur(40px) saturate(200%);
  border: 1px solid var(--border-light);
  border-radius: var(--radius-xl);
  box-shadow: var(--shadow-float);
  max-height: 60vh;
  overflow-y: auto;
  display: none;
  opacity: 0;
  transform: translateY(-10px);
  transition: opacity 0.2s var(--ease-out), transform 0.2s var(--spring);
  padding: 1.5rem;
  z-index: 999;
}

.universal-search-results.active { display: block; opacity: 1; transform: translateY(0); }

.search-results-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 1.5rem; }
.search-category-column { display: flex; flex-direction: column; gap: 0.3rem; }

.search-category-header {
  font-size: 0.75rem;
  font-weight: 600;
  color: var(--text-secondary);
  padding-bottom: 0.5rem;
  border-bottom: 1px solid var(--border-light);
  margin-bottom: 0.5rem;
  display: flex;
  align-items: center;
  gap: 0.4rem;
}

.search-result-item {
  padding: 0.6rem 0.8rem;
  border-radius: var(--radius-sm);
  cursor: pointer;
  font-size: 0.9rem;
  color: var(--text-primary);
  transition: all 0.15s;
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.search-result-item:hover { background-color: var(--border-light); }
.search-result-item.selected { background-color: var(--sys-blue-light); color: var(--sys-blue); font-weight: 500; }
.search-result-item.disabled { opacity: 0.4; cursor: not-allowed; text-decoration: line-through; }
.search-result-item.disabled:hover { background: none; }

.search-no-results { text-align: center; padding: 2rem; color: var(--text-secondary); }
.search-hint { margin-top: 1rem; padding-top: 1rem; border-top: 1px solid var(--border-light); font-size: 0.75rem; color: var(--text-tertiary); display: flex; justify-content: flex-end; gap: 1rem; }

.cat-region { color: var(--sys-teal); }
.cat-pharmacy { color: var(--sys-purple); }
.cat-month { color: var(--sys-green); }
.cat-class { color: var(--sys-orange); }
.cat-medication { color: var(--sys-pink); }

.filters {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: 1.2rem;
  margin-bottom: 2.5rem;
  position: relative;
  z-index: 10;
}

.filter-group {
  position: relative;
  padding-top: 0.85rem;
  animation: slideUpFade 0.6s var(--spring) backwards;
}

.filter-group:nth-child(1) { animation-delay: 0.15s; }
.filter-group:nth-child(2) { animation-delay: 0.2s; }
.filter-group:nth-child(3) { animation-delay: 0.25s; }
.filter-group:nth-child(4) { animation-delay: 0.3s; }
.filter-group:nth-child(5) { animation-delay: 0.35s; }

.filter-label {
  position: absolute;
  top: 0.1rem;
  left: 1rem;
  background: var(--bg-color);
  padding: 0 0.4rem;
  font-size: 0.72rem;
  font-weight: 700;
  color: var(--sys-blue);
  z-index: 3;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  line-height: 1;
  transition: color 0.2s;
}

.custom-select-container { position: relative; width: 100%; }

.custom-select-button {
  width: 100%;
  padding: 0.8rem 2.5rem 0.8rem 1rem;
  background-color: var(--card-bg);
  border: 1px solid var(--border-light);
  border-radius: var(--radius-md);
  font-size: 0.95rem;
  font-weight: 500;
  color: var(--text-primary);
  cursor: pointer;
  text-align: left;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  box-shadow: var(--shadow-sm);
  transition: all 0.2s var(--spring);
  background-image: url("data:image/svg+xml,%3Csvg width='12' height='8' viewBox='0 0 12 8' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1.5 1.5L6 6L10.5 1.5' stroke='%2386868B' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E");
  background-repeat: no-repeat;
  background-position: right 1rem center;
}

.custom-select-button:hover { box-shadow: var(--shadow-md); border-color: var(--border-medium); }
.custom-select-button.active { border-color: var(--sys-blue); box-shadow: 0 0 0 3px var(--border-focus); }

.custom-select-button.has-selection {
  background-color: var(--sys-blue-light);
  border-color: transparent;
  color: var(--sys-blue);
  font-weight: 600;
  background-image: none;
}

.custom-dropdown {
  position: absolute;
  top: calc(100% + 8px);
  left: 0;
  width: 100%;
  max-height: 300px;
  overflow-y: auto;
  background: var(--popover-bg);
  backdrop-filter: blur(40px) saturate(200%);
  -webkit-backdrop-filter: blur(40px) saturate(200%);
  border: 1px solid var(--border-light);
  border-radius: var(--radius-md);
  box-shadow: var(--shadow-lg);
  z-index: 50;
  display: none;
  padding: 0.5rem;
  opacity: 0;
  transform: translateY(-8px) scale(0.98);
  transform-origin: top center;
  transition: opacity 0.2s var(--ease-out), transform 0.2s var(--spring);
}

.custom-dropdown.show { display: block; opacity: 1; transform: translateY(0) scale(1); }

.dropdown-item {
  display: flex;
  align-items: center;
  padding: 0.6rem 0.8rem;
  cursor: pointer;
  border-radius: var(--radius-sm);
  font-size: 0.9rem;
  color: var(--text-primary);
  transition: background-color 0.1s;
}

.dropdown-item:hover { background-color: var(--border-light); }
.dropdown-item.selected { background-color: var(--sys-blue-light); color: var(--sys-blue); font-weight: 500; }
.dropdown-item.disabled-option { color: var(--text-tertiary); order: 2; }
.dropdown-item.disabled-option:hover { background: none; cursor: default; }

.checkbox-custom {
  width: 16px;
  height: 16px;
  border: 1.5px solid var(--text-tertiary);
  border-radius: 4px;
  margin-right: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  transition: all 0.2s;
}

.dropdown-item.selected .checkbox-custom { background-color: var(--sys-blue); border-color: var(--sys-blue); }

.dropdown-item.selected .checkbox-custom::after {
  content: '';
  width: 4px;
  height: 8px;
  border: solid white;
  border-width: 0 2px 2px 0;
  transform: rotate(45deg);
  margin-top: -2px;
}

.clear-filter-btn {
  position: absolute;
  right: 12px;
  top: 50%;
  transform: translateY(-50%);
  width: 24px;
  height: 24px;
  border-radius: 50%;
  background-color: var(--sys-blue-light);
  color: var(--sys-blue);
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  opacity: 0;
  pointer-events: none;
  transition: all 0.2s;
  border: none;
  padding: 0;
}

.custom-select-button.has-selection ~ .clear-filter-btn { opacity: 1; pointer-events: auto; }
.clear-filter-btn:hover { background-color: var(--sys-blue); color: white; transform: translateY(-50%) scale(1.05); }
.clear-filter-btn svg { width: 12px; height: 12px; stroke-width: 2.5; }

.controls-container {
  display: flex;
  justify-content: space-between;
  align-items: center;
  flex-wrap: wrap;
  gap: 1rem;
  margin-bottom: 2.5rem;
  animation: slideUpFade 0.6s var(--spring) 0.4s backwards;
}

.button-group { display: flex; gap: 0.8rem; flex-wrap: wrap; }

.action-btn {
  padding: 0.6rem 1.2rem;
  border-radius: var(--radius-md);
  font-weight: 500;
  font-size: 0.9rem;
  cursor: pointer;
  border: 1px solid var(--border-light);
  display: inline-flex;
  align-items: center;
  gap: 0.5rem;
  transition: all 0.2s var(--spring);
  box-shadow: var(--shadow-sm);
  background-color: var(--card-bg);
}

.action-btn:active { transform: scale(0.96); }

.btn-reset { color: var(--text-primary); }
.btn-reset:hover { background-color: var(--bg-color); border-color: var(--border-medium); }
.btn-explore { background-color: var(--sys-blue); border-color: var(--sys-blue); color: #fff; box-shadow: 0 4px 12px rgba(0, 122, 255, 0.25); }
.btn-explore:hover { background-color: var(--sys-blue-dark); border-color: var(--sys-blue-dark); color: #fff; }
.btn-missing { color: var(--sys-red); }
.btn-missing:hover { background-color: var(--sys-red-light); border-color: transparent; }
.btn-compare { color: var(--sys-purple); }
.btn-compare:hover { background-color: rgba(191, 90, 242, 0.15); border-color: transparent; }
.btn-import { color: var(--sys-indigo); }
.btn-import:hover { background-color: rgba(94, 92, 230, 0.15); border-color: transparent; }
.btn-export { color: var(--sys-green); }
.btn-export:hover { background-color: var(--sys-green-light); border-color: transparent; }

.results-info {
  margin-bottom: 2rem;
  display: flex;
  gap: 1rem;
  flex-wrap: wrap;
  animation: slideUpFade 0.6s var(--spring) 0.5s backwards;
}

.status-badge {
  padding: 0.5rem 1.2rem;
  border-radius: var(--radius-md);
  font-size: 0.85rem;
  font-weight: 600;
  display: inline-flex;
  align-items: center;
  background: var(--card-bg);
  border: 1px solid var(--border-light);
  box-shadow: var(--shadow-sm);
}

#resultsCount { color: var(--sys-blue); background: var(--sys-blue-light); border-color: transparent; }
#missingResultsCount { color: var(--sys-red); background: var(--sys-red-light); border-color: transparent; cursor: pointer; transition: transform 0.2s; }
#missingResultsCount:hover { transform: scale(1.03); }
#duplicateResultsCount { color: var(--sys-orange); background: rgba(255, 159, 10, 0.15); border-color: transparent; cursor: pointer; transition: transform 0.2s; }
#duplicateResultsCount:hover { transform: scale(1.03); }

.stats {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
  gap: 1.5rem;
  margin-bottom: 2.5rem;
}

.stat-card {
  background: var(--card-bg);
  border: 1px solid var(--border-light);
  border-radius: var(--radius-xl);
  padding: 1.5rem 2rem;
  box-shadow: var(--shadow-md);
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  animation: slideUpFade 0.6s var(--spring);
  transition: transform 0.3s var(--spring), box-shadow 0.3s var(--spring);
  position: relative;
  overflow: hidden;
}

.stat-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  border-radius: inherit;
  box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.1);
  pointer-events: none;
}

.stat-card:hover { transform: translateY(-4px); box-shadow: var(--shadow-lg); }

.stat-value {
  font-size: clamp(2rem, 2.5vw, 2.6rem);
  font-weight: 600;
  letter-spacing: -0.04em;
  color: var(--text-primary);
  font-variant-numeric: tabular-nums;
  margin-bottom: 0.2rem;
  line-height: 1.1;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.stat-label { font-size: 0.95rem; color: var(--text-secondary); font-weight: 500; letter-spacing: -0.01em; }
.stat-card-footer { margin-top: 1.2rem; }
.stat-percentage { font-size: 0.85rem; font-weight: 600; color: var(--sys-blue); display: block; margin-bottom: 0.4rem; }

.total-card {

  grid-column: 1 / -1;
  box-shadow: 0 12px 30px rgba(10, 132, 255, 0.3);
  border: none;
}

.total-card .stat-value,
.total-card .stat-label { color: #FFFFFF; }
.total-card::before { box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.2); }

.charts-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 1.5rem; margin-bottom: 2.5rem; }

.chart-container {
  background: var(--card-bg);
  border: 1px solid var(--border-light);
  border-radius: var(--radius-xl);
  padding: 1.5rem;
  box-shadow: var(--shadow-md);
  animation: slideUpFade 0.6s var(--spring);
  height: 420px;
  display: flex;
  flex-direction: column;
  position: relative;
}

.chart-container.wide { grid-column: 1 / -1; height: 500px; }
.chart-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; }
.chart-title { font-size: 1.1rem; font-weight: 600; color: var(--text-primary); letter-spacing: -0.01em; }

.chart-actions {
  display: flex;
  gap: 0.4rem;
  background: var(--bg-color);
  padding: 0.25rem;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border-light);
}

.chart-btn {
  background: transparent;
  border: none;
  padding: 0.3rem 0.8rem;
  border-radius: 6px;
  font-size: 0.8rem;
  font-weight: 600;
  color: var(--text-secondary);
  cursor: pointer;
  transition: all 0.2s;
}

.chart-btn:hover { color: var(--text-primary); }
.chart-btn.active { background: var(--card-bg); color: var(--text-primary); box-shadow: var(--shadow-sm); }
.chart-wrapper { flex-grow: 1; position: relative; width: 100%; }

.explore-table-container,
.missing-table-container {
  background: var(--card-bg);
  border: 1px solid var(--border-light);
  border-radius: var(--radius-xl);
  box-shadow: var(--shadow-md);
  overflow: hidden;
  animation: slideUpFade 0.6s var(--spring);
}

.table-scroll-wrapper { overflow-x: auto; max-height: 70vh; }

table { width: 100%; border-collapse: separate; border-spacing: 0; font-size: 0.95rem; }

th, td {
  padding: 1.2rem 1.4rem;
  white-space: nowrap;
  text-align: left;
  border-bottom: 1px solid var(--border-light);
  font-variant-numeric: tabular-nums;
}

th {
  background: var(--card-bg-translucent);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  font-weight: 600;

  text-transform: uppercase;

}

th:first-child, td:first-child {
  position: sticky;
  left: 0;
  background: inherit;
  z-index: 11;
  font-weight: 500;
  border-right: 1px solid var(--border-light);
}

th:first-child { background: var(--card-bg-translucent); z-index: 12; }
.missing-table-container th { min-width: 150px; }

tbody tr { background: var(--card-bg); transition: background-color 0.2s; }
tbody tr:hover { background-color: var(--border-light); }

.hidden { display: none !important; }

#modalContainer {
  position: fixed;
  top: 0; left: 0;

@media (max-width: 1024px) { .charts-grid { grid-template-columns: 1fr; } }
</style>

<script>
let data = [], filteredData = [], missingData = [], mergedDuplicates = [];
let allYears = [];
let defaultYear = null;
let currentChart = null;
let trendChartInstance = null;
let regionChartInstance = null;
let currentChartType = 'vertical';
let isExploreMode = false;
let isMissingMode = false;
let searchIndices = {};
let activeFilters = { Year: null, Region: [], Pharmacy: [], Month: [], Class: [], MedClass: [] };

const themeKey = 'lx-theme-pref';
let currentTheme = localStorage.getItem(themeKey) || 'auto';

const applyTheme = (theme) => {
  const isDark = theme === 'dark' || (theme === 'auto' && window.matchMedia('(prefers-color-scheme: dark)').matches);
  document.documentElement.classList.toggle('dark', isDark);
  document.documentElement.setAttribute('data-theme', theme);
  document.querySelectorAll('.theme-btn').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.themeValue === theme);
  });
  if (currentChart || trendChartInstance || regionChartInstance) updateDashboard();
};

document.querySelectorAll('.theme-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    currentTheme = btn.dataset.themeValue;
    localStorage.setItem(themeKey, currentTheme);
    applyTheme(currentTheme);
  });
});

window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', () => {
  if (currentTheme === 'auto') applyTheme('auto');
});

applyTheme(currentTheme);

const getThemeColor = (varName) => getComputedStyle(document.documentElement).getPropertyValue(varName).trim();

Chart.defaults.font.family = '-apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", sans-serif';
Chart.defaults.color = '#86868B';

const getCustomTooltip = () => ({
  backgroundColor: getThemeColor('--popover-bg'),
  titleColor: getThemeColor('--text-primary'),
  bodyColor: getThemeColor('--text-primary'),
  titleFont: { size: 14, weight: '600', family: '-apple-system, BlinkMacSystemFont, sans-serif' },
  bodyFont: { size: 13, family: '-apple-system, BlinkMacSystemFont, sans-serif' },
  padding: 12,
  cornerRadius: 12,
  displayColors: true,
  boxPadding: 4,
  borderColor: getThemeColor('--border-light'),
  borderWidth: 1
});

const escapeHTML = (str) => String(str).replace(/[&<>'"]/g, match => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' }[match]));

const monthOrder = {
  july: 1, august: 2, september: 3, october: 4, november: 5, december: 6,
  january: 7, february: 8, march: 9, april: 10, may: 11, june: 12,
  'يوليو': 1, 'أغسطس': 2, 'سبتمبر': 3, 'أكتوبر': 4, 'نوفمبر': 5, 'ديسمبر': 6,
  'يناير': 7, 'فبراير': 8, 'مارس': 9, 'أبريل': 10, 'مايو': 11, 'يونيو': 12,
};

const getMonthOrderValue = (month) => month ? monthOrder[String(month).trim().toLowerCase()] || 99 : 99;

const debounce = (func, wait) => {
  let timeout;
  return (...args) => { clearTimeout(timeout); timeout = setTimeout(() => func(...args), wait); };
};

const normalizeArabic = (str) => {
  if (!str) return '';
  return String(str).toLowerCase()
    .replace(/[\u064B-\u065F\u0670]/g, '')
    .replace(/[إأآا]/g, 'ا')
    .replace(/ة/g, 'ه')
    .replace(/ى/g, 'ي');
};

const medicationCategories = [
  'المسكنات', 'مضادات حيوية', 'كلي', 'نفسية و عصبية', 'قلب', 'سكر حقن',
  'سكر فم', 'نسا', 'كبد', 'جهاز هضمي', 'جهاز تنفسي', 'امراض جلدية',
  'عيون و رمد', 'انف و اذن', 'مضادات تقلصات', 'اورام', 'فيتامينات', 'مختلفة'
];

const searchCategoryConfig = {
  Region: { label: 'Region', class: 'cat-region' },
  Pharmacy: { label: 'Pharmacy', class: 'cat-pharmacy' },
  Month: { label: 'Month', class: 'cat-month' },
  Class: { label: 'Class', class: 'cat-class' },
  MedClass: { label: 'Medication', class: 'cat-medication' }
};

const getAllUniqueOptions = (field) => {
  const values = new Set();
  data.filter(row => row.Year === activeFilters.Year).forEach(row => {
    if (row[field]) values.add(String(row[field]).trim());
  });
  return Array.from(values).sort((a, b) => {
    if (field === 'Month') return getMonthOrderValue(a) - getMonthOrderValue(b);
    return a.localeCompare(b);
  });
};

const getValidOptionsForField = (targetField) => {
  const validValues = new Set();
  data.filter(row => row.Year === activeFilters.Year).forEach((row) => {
    let isValidRow = true;
    const checkMap = { Region: 'Region', Pharmacy: 'Pharmacy', Month: 'Month', Class: 'Class' };

    for (const [filterKey, rowKey] of Object.entries(checkMap)) {
      if (rowKey === targetField) continue;
      const activeVals = activeFilters[filterKey];
      if (activeVals.length > 0) {
        const rowVal = row[rowKey] ? String(row[rowKey]).trim() : '';
        if (!activeVals.includes(rowVal)) { isValidRow = false; break; }
      }
    }

    if (isValidRow && activeFilters.MedClass.length > 0) {
      if (!activeFilters.MedClass.some(cat => parseFloat(row[cat] || 0) > 0)) isValidRow = false;
    }

    if (isValidRow) {
      const val = row[targetField] ? String(row[targetField]).trim() : '';
      if (val) validValues.add(val);
    }
  });
  return validValues;
};

const getAvailableMedClasses = () => {
  const validClasses = new Set();
  data.filter(row => row.Year === activeFilters.Year).forEach(row => {
    let isValidRow = true;
    const checkMap = { Region: 'Region', Pharmacy: 'Pharmacy', Month: 'Month', Class: 'Class' };

    for (const [filterKey, rowKey] of Object.entries(checkMap)) {
      const activeVals = activeFilters[filterKey];
      if (activeVals.length > 0) {
        const rowVal = row[rowKey] ? String(row[rowKey]).trim() : '';
        if (!activeVals.includes(rowVal)) { isValidRow = false; break; }
      }
    }

    if (isValidRow) medicationCategories.forEach(cat => { if (parseFloat(row[cat] || 0) > 0) validClasses.add(cat); });
  });
  return validClasses;
};

const renderCustomDropdown = (field) => {
  const dropdown = document.getElementById(`${field}Dropdown`);
  const btn = document.querySelector(`.custom-select-button[data-id="${field}"]`);
  const key = field.charAt(0).toUpperCase() + field.slice(1);

  let allOptions = field === 'medClass' ? medicationCategories : getAllUniqueOptions(key);
  let validSet = field === 'medClass' ? getAvailableMedClasses() : getValidOptionsForField(key);
  const currentSelection = activeFilters[key];

  const optionsWithStatus = allOptions.map(opt => ({
    value: opt,
    isValid: validSet.has(opt),
    isSelected: currentSelection.includes(opt)
  }));

  optionsWithStatus.sort((a, b) => {
    if (a.isValid && !b.isValid) return -1;
    if (!a.isValid && b.isValid) return 1;
    if (field === 'month') return getMonthOrderValue(a.value) - getMonthOrderValue(b.value);
    return a.value.localeCompare(b.value);
  });

  dropdown.innerHTML = optionsWithStatus.map(opt =>
    `<div class="dropdown-item ${opt.isSelected ? 'selected' : ''} ${!opt.isValid ? 'disabled-option' : ''}" data-value="${escapeHTML(opt.value)}"><div class="checkbox-custom"></div>${escapeHTML(opt.value)}</div>`
  ).join('');

  dropdown.querySelectorAll('.dropdown-item').forEach(item => {
    item.addEventListener('click', (e) => {
      const val = item.getAttribute('data-value');
      if (item.classList.contains('disabled-option') && !item.classList.contains('selected')) return;
      toggleFilter(key, val);
      e.stopPropagation();
    });
  });

  if (currentSelection.length === 0) {
    btn.textContent = 'All';
    btn.classList.remove('has-selection');
  } else if (currentSelection.length === 1) {
    btn.textContent = currentSelection[0];
    btn.classList.add('has-selection');
  } else {
    btn.textContent = `${currentSelection.length} Selected`;
    btn.classList.add('has-selection');
  }
};

const toggleFilter = (category, value) => {
  if (activeFilters[category].includes(value)) {
    activeFilters[category] = activeFilters[category].filter(v => v !== value);
  } else {
    activeFilters[category].push(value);
  }
  updateAllFilterOptions();
  updateDashboard();
  updateSearchVisuals();
};

const buildSearchIndices = () => {
  searchIndices = {};
  ['Region', 'Pharmacy', 'Month', 'Class', 'MedClass'].forEach(field => {
    const options = field === 'MedClass' ? medicationCategories : getAllUniqueOptions(field);
    const normalizedOptions = options.map(opt => ({ item: opt, searchKey: normalizeArabic(opt) }));
    searchIndices[field] = new Fuse(normalizedOptions, {
      threshold: 0.3,
      includeScore: true,
      ignoreLocation: true,
      distance: 100,
      minMatchCharLength: 2,
      keys: ['searchKey']
    });
  });
};

const setupUniversalSearch = () => {
  const searchInput = document.getElementById('universalSearchInput');
  const resultsContainer = document.getElementById('universalSearchResults');
  const clearInputBtn = document.getElementById('clearSearchInput');
  const clearAllBtn = document.getElementById('clearAllFilters');
  const commitSearchBtn = document.getElementById('commitSearchBtn');

  const checkInputState = () => {
    const hasInput = searchInput.value.trim().length > 0;
    clearInputBtn.classList.toggle('hidden', !hasInput);
    commitSearchBtn.classList.toggle('hidden', !hasInput && !resultsContainer.classList.contains('active'));
  };

  document.getElementById('triggerSearchFocus').addEventListener('click', (e) => {
    e.stopPropagation();
    if (resultsContainer.classList.contains('active')) { resultsContainer.classList.remove('active'); searchInput.blur(); }
    else { searchInput.focus(); if (searchInput.value.trim().length > 0) performUniversalSearch(searchInput.value.trim()); }
  });

  clearInputBtn.addEventListener('click', () => { searchInput.value = ''; searchInput.focus(); resultsContainer.classList.remove('active'); checkInputState(); });
  commitSearchBtn.addEventListener('click', () => resultsContainer.classList.remove('active'));

  clearAllBtn.addEventListener('click', () => {
    ['Region', 'Pharmacy', 'Month', 'Class', 'MedClass'].forEach(k => activeFilters[k] = []);
    updateAllFilterOptions(); updateDashboard(); updateSearchVisuals(); searchInput.focus();
    if (resultsContainer.classList.contains('active')) performUniversalSearch(searchInput.value);
  });

  searchInput.addEventListener('input', (e) => {
    checkInputState();
    const query = e.target.value.trim();
    if (query.length < 1) { resultsContainer.classList.remove('active'); return; }
    performUniversalSearch(query);
  });

  searchInput.addEventListener('focus', (e) => {
    if (e.target.value.trim().length >= 1) { performUniversalSearch(e.target.value.trim()); resultsContainer.classList.add('active'); checkInputState(); }
  });

  searchInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') { e.preventDefault(); resultsContainer.classList.remove('active'); } });

  document.addEventListener('keydown', (e) => {
    if ((e.metaKey || e.ctrlKey) && e.key === 'k') { e.preventDefault(); searchInput.focus(); }
  });
};

const performUniversalSearch = (query) => {
  const resultsContainer = document.getElementById('universalSearchResults');
  const fields = ['Region', 'Pharmacy', 'Month', 'Class', 'MedClass'];
  const normalizedQuery = normalizeArabic(query);
  const searchResults = {};
  const validOptionsMap = {
    Region: getValidOptionsForField('Region'),
    Pharmacy: getValidOptionsForField('Pharmacy'),
    Month: getValidOptionsForField('Month'),
    Class: getValidOptionsForField('Class'),
    MedClass: getAvailableMedClasses()
  };

  fields.forEach(field => {
    if (!searchIndices[field]) return;
    const result = searchIndices[field].search(normalizedQuery);
    if (result.length > 0) searchResults[field] = result.map(r => r.item.item);
  });

  const createItemHtml = (itemObj, field) => {
    const { item, isValid, isSelected } = itemObj;
    const itemClass = !isValid && !isSelected ? 'disabled' : (isSelected ? 'selected' : '');
    const safeJSItem = escapeHTML(String(item).replace(/\\/g, '\\\\').replace(/'/g, "\\'"));
    return `<div class="search-result-item ${itemClass}" onmousedown="event.preventDefault()" onclick="handleSearchResultClick(event, '${field}', '${safeJSItem}', this)">
      <span>${escapeHTML(item)}</span>
      ${isSelected ? '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M20 6L9 17l-5-5"/></svg>' : ''}
    </div>`;
  };

  let html = '<div class="search-results-grid">';
  let hasResults = false;

  fields.forEach(field => {
    if (!searchResults[field] || searchResults[field].length === 0) return;
    hasResults = true;
    const config = searchCategoryConfig[field];
    const validItems = [], invalidItems = [];
    searchResults[field].forEach(item => {
      const isValid = validOptionsMap[field].has(item);
      const isSelected = activeFilters[field].includes(item);
      (isValid || isSelected ? validItems : invalidItems).push({ item, isValid, isSelected });
    });
    html += `<div class="search-category-column"><div class="search-category-header ${config.class}">${config.label}</div>`;
    validItems.forEach(i => html += createItemHtml(i, field));
    invalidItems.forEach(i => html += createItemHtml(i, field));
    html += `</div>`;
  });

  html += '</div>';
  if (hasResults) html += `<div class="search-hint"><span>Select items to filter</span></div>`;
  else html = '<div class="search-no-results">No matches found</div>';

  resultsContainer.innerHTML = html;
  resultsContainer.classList.add('active');
  document.getElementById('commitSearchBtn').classList.remove('hidden');
};

const handleSearchResultClick = (e, category, value, element) => {
  if (e) e.stopPropagation();
  const validSet = category === 'MedClass' ? getAvailableMedClasses() : getValidOptionsForField(category);
  if (!validSet.has(value) && !activeFilters[category].includes(value)) return;

  if (activeFilters[category].includes(value)) activeFilters[category] = activeFilters[category].filter(v => v !== value);
  else activeFilters[category].push(value);

  updateAllFilterOptions(); updateDashboard(); updateSearchVisuals();
  const input = document.getElementById('universalSearchInput');
  if (input.value.trim().length > 0) performUniversalSearch(input.value.trim());
  input.focus();
};

const processDataAndHandleDuplicates = (rawData) => {
  const groupedData = {};
  const duplicateTracker = [];
  const categoriesToSum = ['Total Prescription', 'Insurance Covered Prescription', ...medicationCategories];

  rawData.forEach(row => {
    const year = row.Year ? String(row.Year).trim() : '';
    const region = row.Region ? String(row.Region).trim() : '';
    const pharmacy = row.Pharmacy ? String(row.Pharmacy).trim() : '';
    const month = row.Month ? String(row.Month).trim() : '';
    const rowClass = row.Class ? String(row.Class).trim() : 'Unknown';
    if (!year && !pharmacy) return;

    const uniqueKey = `${year}_${region}_${pharmacy}_${month}_${rowClass}`.toLowerCase();
    const currentRowNum = row._rowNum || 'Unknown';

    if (groupedData[uniqueKey]) {
      groupedData[uniqueKey]._duplicateCount = (groupedData[uniqueKey]._duplicateCount || 1) + 1;
      groupedData[uniqueKey]._rows.push(currentRowNum);
      categoriesToSum.forEach(cat => { groupedData[uniqueKey][cat] = (parseFloat(groupedData[uniqueKey][cat] || 0) + parseFloat(row[cat] || 0)); });
    } else {
      groupedData[uniqueKey] = { ...row, _duplicateCount: 1, _rows: [currentRowNum], Year: year, Region: region, Pharmacy: pharmacy, Month: month, Class: rowClass };
      categoriesToSum.forEach(cat => groupedData[uniqueKey][cat] = parseFloat(row[cat] || 0));
    }
  });

  const cleanData = Object.values(groupedData);
  cleanData.forEach(row => {
    if (row._duplicateCount > 1) duplicateTracker.push({ Year: row.Year, Pharmacy: row.Pharmacy, Region: row.Region, Month: row.Month, Class: row.Class, count: row._duplicateCount, rows: row._rows.join(', ') });
    delete row._duplicateCount; delete row._rows;
  });
  return { cleanData, duplicateTracker };
};

const applyFilters = () => {
  filteredData = data.filter((row) => {
    if (String(row.Year) !== activeFilters.Year) return false;
    if (activeFilters.Region.length > 0 && !activeFilters.Region.includes(String(row.Region).trim())) return false;
    if (activeFilters.Pharmacy.length > 0 && !activeFilters.Pharmacy.includes(String(row.Pharmacy).trim())) return false;
    if (activeFilters.Month.length > 0 && !activeFilters.Month.includes(String(row.Month).trim())) return false;
    if (activeFilters.Class.length > 0 && !activeFilters.Class.includes(String(row.Class).trim())) return false;
    if (activeFilters.MedClass.length > 0 && !activeFilters.MedClass.some(cls => parseFloat(row[cls] || 0) > 0)) return false;
    return true;
  });
};

const addStatCard = (label, value, options = {}) => {

  let footer = '';

  if (options.cardType === 'medication' && options.percentage !== undefined) {
    const pct = Math.max(0, Math.min(100, parseFloat(options.percentage) || 0));
    footer = `<div class="stat-card-footer"><span class="stat-percentage">${pct.toFixed(1)}%</span><div class="stat-progress-container"><div class="stat-progress-bar" style="width:${pct}%"></div></div></div>`;
  }

  card.innerHTML = `<div class="stat-card-content"><div class="stat-value" title="${fmtValue}">${fmtValue}</div><div class="stat-label">${escapeHTML(label)}</div></div>${footer}`;
  container.appendChild(card);

const updateStats = () => {
  document.getElementById('statsContainer').innerHTML = '';

  const totalPrescriptions = filteredData.reduce((sum, row) => sum + parseFloat(row['Total Prescription'] || 0), 0);
  const insuranceCovered = filteredData.reduce((sum, row) => sum + parseFloat(row['Insurance Covered Prescription'] || 0), 0);
  const activePharmacies = new Set(filteredData.map(row => row.Pharmacy).filter(Boolean)).size;
  const totalVal = targetCats.reduce((sum, cat) => sum + filteredData.reduce((rSum, row) => rSum + parseFloat(row[cat] || 0), 0), 0);
  const yearPharmacies = new Set(data.filter(d => d.Year === activeFilters.Year).map(r => r.Pharmacy).filter(Boolean)).size;

  addStatCard('Total Value', totalVal, { cardType: 'total' });
  addStatCard('Prescriptions', totalPrescriptions, { cardType: 'medication' });
  addStatCard('Insurance Covered', insuranceCovered, { cardType: 'medication' });
  addStatCard('Pharmacies', activePharmacies, { cardType: 'medication', percentage: yearPharmacies > 0 ? (activePharmacies / yearPharmacies) * 100 : 0 });
  targetCats.forEach(cat => {
    const val = filteredData.reduce((sum, row) => sum + parseFloat(row[cat] || 0), 0);
    addStatCard(cat, val, { cardType: 'medication', percentage: totalVal > 0 ? (val / totalVal) * 100 : 0 });

const findMissingTotals = () => {
  missingData = [];
  const baseDataset = data.filter(d =>
    String(d.Year) === activeFilters.Year &&
    (activeFilters.Region.length === 0 || activeFilters.Region.includes(d.Region)) &&
    (activeFilters.Class.length === 0 || activeFilters.Class.includes(d.Class))
  );

  const allMonths = Array.from(new Set(data.filter(d => String(d.Year) === activeFilters.Year).map(r => r.Month))).filter(Boolean).sort((a, b) => getMonthOrderValue(a) - getMonthOrderValue(b));
  const monthsToCheck = activeFilters.Month.length > 0 ? activeFilters.Month : allMonths;
  const eligiblePharmacies = Array.from(new Set(baseDataset.map(r => r.Pharmacy))).filter(Boolean);

  if (activeFilters.Pharmacy.length > 0) {
    const filtered = eligiblePharmacies.filter(p => activeFilters.Pharmacy.includes(p));
    eligiblePharmacies.length = 0; eligiblePharmacies.push(...filtered);
  }

  const pharmacyRegions = {};
  data.forEach(r => { if (r.Pharmacy) pharmacyRegions[r.Pharmacy] = r.Region; });

  monthsToCheck.forEach(month => {
    const activeInMonth = new Set(baseDataset.filter(r => r.Month === month).map(r => r.Pharmacy));
    eligiblePharmacies.forEach(pharmacy => {
      if (!activeInMonth.has(pharmacy)) missingData.push({ Region: pharmacyRegions[pharmacy] || 'Unknown', Pharmacy: pharmacy, Month: month, Status: 'Inactive' });
    });
  });

  missingData.sort((a, b) => a.Region.localeCompare(b.Region) || a.Pharmacy.localeCompare(b.Pharmacy) || getMonthOrderValue(a.Month) - getMonthOrderValue(b.Month));
};

const getTrendIndicator = (c, p) => {
  if (p == null || c == null) return '';
  if (c === p) return '<span style="color:var(--text-tertiary)">—</span>';
  return c > p ? '<span style="color:var(--sys-green);font-weight:600">↑</span>' : '<span style="color:var(--sys-red);font-weight:600">↓</span>';
};

const updateExploreView = () => {
  const tbody = document.querySelector('#exploreTable tbody');
  const thead = document.querySelector('#exploreTable thead tr');
  const months = Array.from(new Set(filteredData.map(r => r.Month))).filter(Boolean).sort((a, b) => getMonthOrderValue(a) - getMonthOrderValue(b));
  thead.innerHTML = '<th>Metric</th>' + months.map(m => `<th>${escapeHTML(m)}</th>`).join('');

  const targetMetrics = activeFilters.MedClass.length > 0 ? activeFilters.MedClass : medicationCategories;
  const metrics = ['Total', 'Total Prescriptions', 'Insurance Covered', 'Active Pharmacies', ...targetMetrics];
  const monthlyData = {};

  months.forEach(m => {
    const md = filteredData.filter(r => r.Month === m);
    monthlyData[m] = {
      Total: targetMetrics.reduce((s, c) => s + md.reduce((ms, r) => ms + parseFloat(r[c] || 0), 0), 0),
      'Total Prescriptions': md.reduce((s, r) => s + parseFloat(r['Total Prescription'] || 0), 0),
      'Insurance Covered': md.reduce((s, r) => s + parseFloat(r['Insurance Covered Prescription'] || 0), 0),
      'Active Pharmacies': new Set(md.map(r => r.Pharmacy)).size,
      ...Object.fromEntries(medicationCategories.map(c => [c, md.reduce((s, r) => s + parseFloat(r[c] || 0), 0)]))
    };
  });

  tbody.innerHTML = metrics.map(metric => {
    let hasData = false; let prev = null;
    const cells = months.map(m => {
      const val = monthlyData[m][metric];
      if (val > 0) hasData = true;
      const trend = getTrendIndicator(val, prev); prev = val;
      return `<td>${val.toLocaleString(undefined, { maximumFractionDigits: 0 })} ${trend}</td>`;
    }).join('');
    return hasData ? `<tr><td>${escapeHTML(metric)}</td>${cells}</tr>` : '';
  }).join('');
};

const updateMissingView = () => {
  document.querySelector('#missingTable tbody').innerHTML = missingData.map(i =>
    `<tr><td>${escapeHTML(i.Region)}</td><td><strong>${escapeHTML(i.Pharmacy)}</strong></td><td>${escapeHTML(i.Month)}</td><td><span style="color:var(--sys-red);font-weight:600;background:var(--sys-red-light);padding:0.3rem 0.8rem;border-radius:12px;font-size:0.8rem;">Inactive</span></td></tr>`
  ).join('');
};

const updateDashboard = debounce(() => {
  applyFilters(); findMissingTotals();
  const resCount = document.getElementById('resultsCount');
  const misCount = document.getElementById('missingResultsCount');
  const dupeCount = document.getElementById('duplicateResultsCount');

  if (isExploreMode) {
    document.querySelector('.dashboard-view').classList.add('hidden');
    document.querySelector('.missing-view').classList.add('hidden');
    document.querySelector('.explore-view').classList.remove('hidden');
    updateExploreView();
    resCount.innerHTML = `Metrics across ${Array.from(new Set(filteredData.map(r => r.Month))).length} months`;
    misCount.classList.add('hidden'); dupeCount.classList.add('hidden');
  } else if (isMissingMode) {
    document.querySelector('.dashboard-view').classList.add('hidden');
    document.querySelector('.explore-view').classList.add('hidden');
    document.querySelector('.missing-view').classList.remove('hidden');
    updateMissingView();
    resCount.innerHTML = `${missingData.length} inactive records`;
    misCount.classList.add('hidden'); dupeCount.classList.add('hidden');
  } else {
    document.querySelector('.explore-view').classList.add('hidden');
    document.querySelector('.missing-view').classList.add('hidden');
    document.querySelector('.dashboard-view').classList.remove('hidden');
    updateStats(); updateMedicationChart(); updateMonthlyTrendChart(); updateRegionChart();
    resCount.innerHTML = `${filteredData.length} Results`;

    if (missingData.length > 0) {
      misCount.classList.remove('hidden');
      misCount.innerHTML = `${missingData.length} Missing`;
      misCount.onclick = () => document.getElementById('toggleMissingBtn').click();
    } else { misCount.classList.add('hidden'); }

    if (mergedDuplicates.length > 0) {
      dupeCount.classList.remove('hidden');
      dupeCount.innerHTML = `${mergedDuplicates.length} Duplicates`;
      dupeCount.onclick = () => showDuplicateDetails(mergedDuplicates);
    } else { dupeCount.classList.add('hidden'); }
  }
}, 150);

const showDuplicateDetails = (duplicates) => {
  const modal = document.getElementById('modalContainer');
  modal.innerHTML = `
    <div class="modal-content" onclick="event.stopPropagation()">
      <div style="padding:1.5rem;border-bottom:1px solid var(--border-light);display:flex;justify-content:space-between;align-items:center;">
        <h3 style="margin:0;font-size:1.2rem;font-weight:600;color:var(--text-primary);">Merged Duplicates</h3>
        <button style="background:var(--border-light);border:none;width:30px;height:30px;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text-primary);" onclick="document.getElementById('modalContainer').classList.add('hidden')">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
        </button>
      </div>
      <div style="overflow-y:auto;max-height:60vh;">
        ${duplicates.map(d => `
          <div style="padding:1.2rem;border-bottom:1px solid var(--border-light);">
            <div style="display:flex;justify-content:space-between;margin-bottom:0.6rem;align-items:center;">
              <div style="font-weight:500;color:var(--text-primary);">${escapeHTML(d.Year)} • ${escapeHTML(d.Pharmacy)} • ${escapeHTML(d.Month)}</div>
              <span style="background:var(--sys-orange);color:#000;padding:0.2rem 0.6rem;border-radius:12px;font-size:0.8rem;font-weight:600;">${d.count} Merged</span>
            </div>
            <div style="font-size:0.85rem;color:var(--text-secondary);background:var(--border-light);padding:0.8rem;border-radius:var(--radius-sm);font-family:monospace;">IDs: ${escapeHTML(d.rows)}</div>
          </div>`).join('')}
      </div>
    </div>`;
  modal.classList.remove('hidden');
  modal.onclick = () => modal.classList.add('hidden');
};

const exportData = () => {
  const filterText = `Fiscal Year: ${activeFilters.Year || 'All'} | Filters: ${getFilterSummary()}`;
  let aoa = [[filterText], []];

  if (isExploreMode) {
    const tempSheet = XLSX.utils.table_to_sheet(document.getElementById('exploreTable'));
    aoa = aoa.concat(XLSX.utils.sheet_to_json(tempSheet, { header: 1 }));
  } else {
    const sourceData = isMissingMode ? missingData : filteredData;
    if (sourceData.length > 0) {
      const headers = Object.keys(sourceData[0]);
      aoa.push(headers);
      sourceData.forEach(row => aoa.push(headers.map(h => row[h])));
    } else { aoa.push(['No data available']); }
  }

  const ws = XLSX.utils.aoa_to_sheet(aoa);
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, 'Data');
  XLSX.writeFile(wb, 'Export.xlsx');
};

document.getElementById('resetFiltersBtn').addEventListener('click', () => {
  ['Region', 'Pharmacy', 'Month', 'Class', 'MedClass'].forEach(k => activeFilters[k] = []);
  updateAllFilterOptions(); updateDashboard(); updateSearchVisuals();
});

document.getElementById('toggleExploreBtn').addEventListener('click', () => {
  isExploreMode = !isExploreMode; isMissingMode = false;
  const btn = document.getElementById('toggleExploreBtn');
  if (isExploreMode) {
    btn.innerHTML = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg> Back`;
    document.getElementById('toggleMissingBtn').innerHTML = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg> Missing`;
  } else {
    btn.innerHTML = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="9" y1="21" x2="9" y2="9"/></svg> Explore`;
  }
  updateDashboard();
});

document.getElementById('toggleMissingBtn').addEventListener('click', () => {
  isMissingMode = !isMissingMode; isExploreMode = false;
  const btn = document.getElementById('toggleMissingBtn');
  if (isMissingMode) {
    btn.innerHTML = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg> Back`;
    document.getElementById('toggleExploreBtn').innerHTML = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="9" y1="21" x2="9" y2="9"/></svg> Explore`;
  } else {
    btn.innerHTML = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg> Missing`;
  }
  updateDashboard();
});

document.getElementById('exportExcelBtn').addEventListener('click', exportData);

const SHEET_ID = '122uThrt83Vs8rUtOe4PCmsWjLSxv8A-OmUbT0Y3PZeg';
fetch(`https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv`)
  .then(r => r.text())
  .then(csv => {
    Papa.parse(csv, {
      header: true,
      skipEmptyLines: true,
      complete: (results) => {
        results.data.forEach((row, index) => { row._rowNum = index + 2; });
        const processed = processDataAndHandleDuplicates(results.data);
        data = processed.cleanData;
        mergedDuplicates = processed.duplicateTracker;
        allYears = [...new Set(data.map(d => d.Year))].filter(Boolean).map(Number).sort((a, b) => a - b);
        if (allYears.length) defaultYear = Math.max(...allYears);
        populateYearFilter();
        setupDropdowns();
        updateAllFilterOptions();
        buildSearchIndices();
        updateDashboard();
        setupUniversalSearch();
      }
    });
  });
</script>
</body>
